                            <!-- Quality -->
                            <td class="slds-text-align_center" style="width: 180px">
                                <lightning-input variant="label-hidden" data-label="quality" data-index={answer.index}
                                    onchange={handleScoreChange}></lightning-input>
                            </td>

                            <!-- Packaging -->
                            <td class="slds-text-align_center" style="width: 150px">
                                <lightning-combobox value={answer.packaging} label="Packaging" variant="label-hidden"
                                    options={optionsPackaging} data-label="packaging" data-index={answer.index}
                                    onchange={handlePackagingChange}></lightning-combobox>
                            </td>

                            <!-- Price -->
                            <td class="slds-text-align_right" style="width: 180px">
                                <lightning-input variant="label-hidden" data-label="price" data-index={answer.index}
                                    onchange={handleScoreChange}></lightning-input>
                            </td>

                            <!-- Actions -->
                            <td class="slds-text-align_center" style="width: 0;">
                                <div style="display: flex; justify-content: space-around;">
                                    <lightning-button-icon icon-name="utility:add" alternative-text="Add Product"
                                        title="Add Product" onclick={addAnswerItem} data-index={answer.index}>
                                    </lightning-button-icon>
                                    <lightning-button-icon icon-name="utility:delete" alternative-text="Remove Product"
                                        title="Remove Product" onclick={removeAnswer} data-index={answer.index}
                                        class="slds-m-left_xx-small">
                                    </lightning-button-icon>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>


            <!-- Description and Submit Button -->
            <div class="slds-grid slds-wrap slds-m-top_medium">
                <!-- <template if:true={enquiryTypeIsEnquiry}>
                    <div class="slds-col slds-size_1-of-1 slds-text-align_center">
                        <lightning-button label="Submit" onclick={createOpportunity}></lightning-button>
                    </div>
                </template> -->

                <div class="slds-col slds-size_1-of-1 slds-text-align_center">
                    <lightning-button label="Cancel" onclick={handleCancel}></lightning-button>
                    <lightning-button label="Submit" onclick={createLead} style="margin-left: 10px;"></lightning-button>

                </div>

            </div>
        </div>
    </lightning-card>




</template>
