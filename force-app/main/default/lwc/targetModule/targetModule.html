<template>
    <lightning-card variant="narrow" class="card">
        <lightning-record-edit-form object-api-name="Employee_Wise_Target__c">
            <lightning-layout multiple-rows size="12">
                <!-- Fiscal Year Field -->
                <lightning-layout-item size="2" class="slds-p-top_x-small slds-p-horizontal_x-small"
                    small-device-size="2" medium-device-size="2" large-device-size="2">
                    <lightning-input-field field-name="Fiscal_Year__c" variant="label-stacked"
                        onchange={onFilterInputChange} value={fiscId}>
                    </lightning-input-field>
                </lightning-layout-item>

                <!-- Employee Field -->
                <lightning-layout-item if:true={employes} size="2" class="slds-p-top_x-small slds-p-horizontal_x-small"
                    small-device-size="2" medium-device-size="2" large-device-size="2">
                    <lightning-input-field field-name="Employee__c" variant="label-stacked"
                        onchange={onFilterInputChange} value={empId}>
                    </lightning-input-field>
                </lightning-layout-item>

                <!-- Account Field -->
                <lightning-layout-item if:true={account} size="2" class="slds-p-top_x-small slds-p-horizontal_x-small"
                    small-device-size="2" medium-device-size="2" large-device-size="2">
                    <lightning-input-field field-name="Account__c" variant="label-stacked"
                        onchange={onFilterInputChange} value={accId}>
                    </lightning-input-field>
                </lightning-layout-item>

                <!-- EWTarget Quantity Display -->
                <lightning-layout-item if:true={EWTarget_Flag} size="3"
                    class="slds-p-top_x-small slds-p-horizontal_x-small" small-device-size="3" medium-device-size="3"
                    large-device-size="3" style="padding-top: 33px !important; font-size: 15px; font-weight: 500;">
                    EWTarget Quantity : {EWTarget_value}
                </lightning-layout-item>

                <!-- Empty Spacer -->
                <lightning-layout-item if:true={Blank_Flag} size="2"
                    class="slds-p-top_x-small slds-p-horizontal_x-small" small-device-size="2" medium-device-size="2"
                    large-device-size="2" style="padding-top: 33px !important; font-size: 15px; font-weight: 500;">
                </lightning-layout-item>

                <!-- Target Quantity Display -->
                <lightning-layout-item if:true={showTargetQuantity} size="3"
                    class="slds-p-top_x-small slds-p-horizontal_x-small" small-device-size="3" medium-device-size="3"
                    large-device-size="3" style="padding-top: 33px !important; font-size: 15px; font-weight: 500;">
                    Target Quantity : {EWTarget_value}
                </lightning-layout-item>

                <!-- Remaining Quantity Display -->
                <lightning-layout-item if:true={showRemainingQuantity} size="3"
                    class="slds-p-top_x-small slds-p-horizontal_x-small" small-device-size="3" medium-device-size="3"
                    large-device-size="3" style="padding-top: 33px !important; font-size: 15px; font-weight: 500;">
                    Remaining Quantity : {remaining_value}
                </lightning-layout-item>

                <!-- Spacer Columns -->
                <lightning-layout-item size="3" class="slds-p-top_x-small slds-p-horizontal_x-small"
                    small-device-size="2" medium-device-size="3" large-device-size="3">
                </lightning-layout-item>

                <lightning-layout-item size="3" class="slds-p-top_x-small slds-p-horizontal_x-small"
                    small-device-size="3" medium-device-size="3" large-device-size="3">
                </lightning-layout-item>

                <!-- Target Amount Display -->
                <lightning-layout-item if:true={EWPCTarget_Flag} size="2"
                    class="slds-p-top_x-small slds-p-horizontal_x-small" small-device-size="3" medium-device-size="3"
                    large-device-size="3" style="padding-top: 33px !important; font-size: 15px; font-weight: 500;">
                    Target Amount : {EWATarget_value}
                </lightning-layout-item>

                <!-- Remaining Amount Display -->
                <lightning-layout-item if:true={remaining_flag} size="3"
                    class="slds-p-top_x-small slds-p-horizontal_x-small" small-device-size="3" medium-device-size="3"
                    large-device-size="3" style="padding-top: 33px !important; font-size: 15px; font-weight: 500;">
                    Remaining Amount : {remaining_amt}
                </lightning-layout-item>

            </lightning-layout>
        </lightning-record-edit-form>
    </lightning-card>

    <!-- Tab Set -->
    <lightning-card variant="narrow" class="card">
        <lightning-tabset variant="vertical">

            <!-- Employee Wise Target -->
            <lightning-tab onactive={handleparentTabChange} data-label="Employee_Wise_Target__c"
                label="Employee Wise Target">
                <lightning-tabset if:true={employeeWise} class="childTabSet">
                    <lightning-tab onactive={handleChildTabChange} data-label="Yearly" label="Yearly">
                        <c-assign-target-employee-wise if:true={filters} parent-tab-label={parentTabLabel}
                            child-tab-label={childTabLabel} fisc-id={fiscId}
                            onhandletogglespinner={handleToggleSpinner}>
                        </c-assign-target-employee-wise>
                    </lightning-tab>
                    <lightning-tab onactive={handleChildTabChange} data-label="Monthly" label="Monthly">
                        <c-assign-target-employee-wise if:true={filters} parent-tab-label={parentTabLabel}
                            child-tab-label={childTabLabel} fisc-id={fiscId}
                            onhandletogglespinner={handleToggleSpinner}>
                        </c-assign-target-employee-wise>
                    </lightning-tab>
                </lightning-tabset>
            </lightning-tab>

            <!-- Employee Wise Account Target -->
            <lightning-tab onactive={handleparentTabChange} data-label="Employee_Wise_Account_Target__c"
                label="Employee Wise Account Target" class="slds-scrollable">
                <lightning-tabset class="childTabSet" if:true={employeeCategoryWise}>
                    <lightning-tab onactive={handleChildTabChange} data-label="Yearly" label="Yearly">
                        <c-assign-target-employee-wise if:true={filters} parent-tab-label={parentTabLabel}
                            child-tab-label={childTabLabel} fisc-id={fiscId} emp-id={empId}
                            onremainingvalue={handleRemainingValueCheck} target-val-flag={EWTarget_value}
                            target-amount-flag={EWATarget_value} onhandletogglespinner={handleToggleSpinner}>
                        </c-assign-target-employee-wise>
                    </lightning-tab>
                    <lightning-tab onactive={handleChildTabChange} data-label="Monthly" label="Monthly">
                        <c-assign-target-employee-wise parent-tab-label={parentTabLabel} child-tab-label={childTabLabel}
                            fisc-id={fiscId} emp-id={empId} target-val-flag={EWTarget_value}
                            target-amount-flag={EWATarget_value} onremainingvalue={handleRemainingValueCheck}
                            onhandletogglespinner={handleToggleSpinner}>
                        </c-assign-target-employee-wise>
                    </lightning-tab>
                </lightning-tabset>
            </lightning-tab>

            <!-- Account Wise Employee Wise Product Target -->
            <lightning-tab onactive={handleparentTabChange} data-label="Account_Wise_Product_Target__c"
                label="Employee Wise Account Wise Product Target" class="slds-scrollable">
                <lightning-tabset class="childTabSet" if:true={employeeProductWise}>
                    <lightning-tab onactive={handleChildTabChange} data-label="Yearly" label="Yearly">
                        <c-assign-target-employee-wise parent-tab-label={parentTabLabel} child-tab-label={childTabLabel}
                            fisc-id={fiscId} emp-id={empId} acc-id={accId} prod-cat-val={prodCatVal}
                            product-code={ProductCode} target-val-flag={EWTarget_value}
                            target-amount-flag={EWATarget_value} onremainingvalue={handleRemainingValueCheck}
                            onhandletogglespinner={handleToggleSpinner}>
                        </c-assign-target-employee-wise>
                    </lightning-tab>
                    <lightning-tab onactive={handleChildTabChange} data-label="Monthly" label="Monthly">
                        <c-assign-target-employee-wise parent-tab-label={parentTabLabel} editable="true"
                            child-tab-label={childTabLabel} fisc-id={fiscId} emp-id={empId} acc-id={accId}
                            prod-cat-val={prodCatVal} target-val-flag={EWTarget_value}
                            target-amount-flag={EWATarget_value} onremainingvalue={handleRemainingValueCheck}
                            onhandletogglespinner={handleToggleSpinner}>
                        </c-assign-target-employee-wise>
                    </lightning-tab>
                </lightning-tabset>
            </lightning-tab>

        </lightning-tabset>
    </lightning-card>
</template>
