<template>
    <lightning-card title="Product Files" icon-name="standard:product">
        <!-- Show loading spinner when data is loading -->
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading"></lightning-spinner>
        </template>


        <lightning-layout multiple-rows class="slds-m-top_small">
            <lightning-layout-item size="12" large-device-size="2"></lightning-layout-item>
            <lightning-layout-item size="12" large-device-size="8">
                <div class="slds-box slds-theme–default">
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th class="" scope="col"
                                    style="width: 5%;background-color: #642156;color: rgb(255, 255, 255);">
                                    S.no
                                </th>
                                <th class="" scope="col" style="background-color: #642156;color: rgb(255, 255, 255);">
                                </th>
                                <th class="" scope="col" style="background-color: #642156;color: rgb(255, 255, 255);">
                                    Product Name
                                </th>
                                <th class="" scope="col" style="background-color: #642156;color: rgb(255, 255, 255);">
                                    <!-- View Files -->
                                </th>

                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={tableData} for:item="item" for:index="index">
                                <tr class="slds-hint-parent" key={item.Id}>
                                    <td>
                                        <div class="slds-cell-wrap">{item.index}</div>
                                    </td>
                                    <td>
                                        <lightning-icon icon-name="utility:add" size="x-small" data-id={item.Id}
                                            alternative-text="Connected" if:true={item.openFiles}
                                            onclick={handleOpenChild} data-label="open" title="Connected"
                                            class="my-icon">
                                        </lightning-icon>


                                        <lightning-icon icon-name="utility:dash" size="x-small"
                                            onclick={handleOpenChild} data-label="close" data-id={item.Id}
                                            alternative-text="Connected" if:true={item.closeFiles} title="Connected"
                                            class="my-icon">
                                        </lightning-icon>

                                    </td>
                                    <td>
                                        <div class="slds-cell-wrap">{item.Name}</div>
                                    </td>

                                    <td>
                                        <!-- <lightning-button label="Add To send" onclick={addFileToSend} data-id={item.Id}>
                                        </lightning-button> -->

                                        <!-- <lightning-icon icon-name="action:new" size="small" alternative-text="Approved" title="Approved"></lightning-icon> -->
                                    </td>
                                </tr>

                                <template if:true={item.showChildData}>
                                    <tr key={item.Id}>
                                        <td colspan="1"></td>
                                        <td colspan="10">
                                            <table
                                                class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped"
                                                style="width:100%;text-align:Center;">
                                                <thead>
                                                    <tr class="slds-line-height_reset">
                                                        <th class="" scope="col"
                                                            style="    width: 5%;background-color: #642156;color: rgb(255, 255, 255);">
                                                            Select
                                                        </th>
                                                        <th class="" scope="col"
                                                            style="width: 60%;background-color: #642156;color: rgb(255, 255, 255);">
                                                            File Name
                                                        </th>
                                                        <th class="" scope="col"
                                                            style="background-color: #642156;color: rgb(255, 255, 255);">
                                                            View Files
                                                        </th>

                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <template for:each={item.dataChildFiles} for:index="index"
                                                        for:item="file">
                                                        <tr key={file.Id}>
                                                            <td>
                                                                <lightning-input type="checkbox"
                                                                    checked={file.selectFile} data-id={file.Id}
                                                                    onchange={handleFileSelect}></lightning-input>
                                                            </td>
                                                            <td>{file.Name}</td>
                                                            <td>
                                                                <lightning-icon icon-name="standard:document_preview"
                                                                    size="medium (default)" data-id={file.Id}
                                                                    onclick={viewFile}></lightning-icon>
                                                            </td>
                                                        </tr>
                                                    </template>
                                                </tbody>
                                            </table>
                                        </td>
                                    </tr>
                                </template>
                            </template>
                        </tbody>
                    </table>
                </div>

                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={backTorecord}>Back</button>
                    <button class="slds-button slds-button_neutral" onclick={refreshCmp}>Refresh</button>
                    <button class="slds-button slds-button_brand" onclick={openModaltoSend}
                        disabled={isSendDisabled}>Send Mail</button>

                </footer>

            </lightning-layout-item>
            <lightning-layout-item size="12" large-device-size="2"></lightning-layout-item>
        </lightning-layout>


        <template if:true={OpenModal}>
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
                aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <!-- modal header start -->
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close" onclick={hideModalBox}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse"
                                size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 id="modal-heading-02" class="slds-text-heading_medium slds-hyphenate">Send Files to Customer
                        </h2>
                    </header>

                    <!-- modal body start -->
                    <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                        <lightning-layout multiple-rows>
                            <lightning-layout-item size="12" large-device-size="12">
                                <label>To Address&nbsp;:</label>
                                <lightning-input value={ToAddress} variant="label-hidden" data-label="toaddress"
                                    onchange={handleToAddressChange}></lightning-input>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" large-device-size="12" class="slds-m-top_small">
                                <label>CC Address&nbsp;:</label>
                                <lightning-input value={ccAddress} variant="label-hidden" data-label="toCCaddress"
                                    onchange={handleCCAddressChange}></lightning-input>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" large-device-size="12" class="slds-m-top_small">
                                <label>Subject&nbsp;:</label>
                                <lightning-input value={subject} variant="label-hidden" data-label="subject"
                                    onchange={handleSubChange}></lightning-input>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" large-device-size="12" class="slds-m-top_small">
                                <label>Body&nbsp;:</label>
                                <lightning-input-rich-text value={commnetBody} onchange={handleBodyChange}
                                    data-label="commnetBody" variant="label-hidden">
                                </lightning-input-rich-text>
                            </lightning-layout-item>
                        </lightning-layout>


                    </div>


                    <!-- modal footer start-->
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={hideModalBox}>Cancel</button>
                        <button class="slds-button slds-button_brand" onclick={handleSendMail}>Send</button>

                    </footer>

                </div>
            </section>
        </template>


    </lightning-card>
</template>
