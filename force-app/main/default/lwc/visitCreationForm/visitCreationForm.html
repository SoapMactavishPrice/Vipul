<template>

    <lightning-card title="Create Visit" icon-name="standard:event">
        <div class="slds-p-around_xx-small">
            <template for:each={visitRows} for:item="row">
                <div key={row.id} style="    border: 1px solid;margin: 13px 5px;;border-radius: 5px;">
                    <div class="slds-grid slds-wrap">

                        <!-- Visit For -->
                        <div
                            class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-large-size_1-of-8 slds-p-around_x-small">
                            <lightning-combobox name="visitFor" label="Visit For" value={row.visitFor}
                                options={visitForOptions} data-row-id={row.id} onchange={handleVisitForChange} required>
                            </lightning-combobox>
                        </div>

                        <!-- Lead/Account -->
                        <div
                            class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-large-size_1-of-8 slds-p-around_x-small">

                            <template if:true={row.accountId}>
                                <lightning-record-picker label="Lead/Account" placeholder="Search..."
                                    object-api-name={row.recordPickerObject} display-field="Name" value={row.accountId}
                                    data-row-id={row.id} onchange={handleRecordSelection} required>
                                </lightning-record-picker>
                            </template>

                            <template if:false={row.accountId}>
                                <lightning-record-picker label="Lead/Account" placeholder="Search..."
                                    object-api-name={row.recordPickerObject} display-field="Name" value={row.accountId}
                                    data-row-id={row.id} onchange={handleRecordSelection} required>
                                </lightning-record-picker>
                            </template>

                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-large-size_1-of-8 slds-p-around_x-small">
                            <lightning-record-picker label="Visit Title" placeholder="Search Visit Title"
                                object-api-name="Visit_Title__c" display-field="Name"
                                value={row.visitTitleId}
                                data-row-id={row.id}
                                onchange={handleVisitTitleChange}>
                            </lightning-record-picker>
                        </div>


                        <!-- Purpose -->
                        <div
                            class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-large-size_1-of-8 slds-p-around_x-small">
                            <!-- <lightning-input type="text" label="Visit Purpose" value={row.purpose} data-row-id={row.id}
                                onchange={handlePurposeChange} required>
                            </lightning-input> -->


                            <!-- <lightning-combobox class="slds-size_2-of-2" value={row.purpose}
                                options={visitPurposeOptions} label="Visit Purpose" data-row-id={row.id}
                                data-index={index} data-api="Visit_Purpose__c" onchange={handlePurposeChange}>
                            </lightning-combobox> -->
                            <lightning-input class="slds-size_2-of-2" value={row.purpose} options={visitPurposeOptions}
                                label="Visit Purpose" data-row-id={row.id} data-index={index}
                                data-api="Visit_Purpose__c" onchange={handlePurposeChange}>
                            </lightning-input>

                        </div>

                        <!-- Start -->
                        <div
                            class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-large-size_1-of-8 slds-p-around_x-small">
                            <lightning-input type="datetime" label="Visit Start" value={row.startDateTime}
                                data-row-id={row.id} onchange={handleStartDateChange} label-hidden required>
                            </lightning-input>

                        </div>

                        <!-- End -->
                        <div
                            class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-large-size_1-of-8 slds-p-around_x-small">
                            <lightning-input type="datetime" label="Visit End" value={row.endDateTime}
                                data-row-id={row.id} onchange={handleEndDateChange} required>
                            </lightning-input>
                        </div>

                        <!-- Attendees -->
                        <div
                            class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-large-size_1-of-8 slds-p-around_x-small">
                            <label class="slds-form-element__label">Attendees</label>

                            <!-- <template > -->
                            <c-enhanced-custom-lookup style="width: 98%; margin-left: 1.5%;" object-api-name="User"
                                filter="isActive = true" icon-name="standard:user" return-fields=""
                                if:true={isAttendeesVisible} sort-column="Name" display-fields=""
                                query-fields="['Name']" data-index={index} data-api="Attendees" data-row-id={row.id}
                                onrecordselection={handleAddAttendees}>
                            </c-enhanced-custom-lookup>
                            <!-- </template> -->
                            <!-- <template > -->
                            <c-enhanced-custom-lookup style="width: 98%;" if:false={isAttendeesVisible}
                                object-api-name="User" filter="isActive = true" icon-name="standard:user"
                                return-fields="" sort-column="Name" display-fields="" query-fields="['Name']"
                                data-index={index} data-row-id={row.id} data-api="Attendees"
                                onrecordselection={handleAddAttendees}>
                            </c-enhanced-custom-lookup>
                            <!-- </template> -->

                            <template if:true={row.attendees}>
                                <div class="slds-p-top_xx-small">
                                    <template for:each={row.attendees} for:item="attendee" for:index="attendeeIndex">
                                        <template if:true={attendee.name}>
                                            <lightning-pill key={attendee.id} class="slds-p-around_xx-small"
                                                label={attendee.name} data-row-id={row.id}
                                                data-attendee-id={attendee.id} onremove={handleRemoveAttendee}>
                                            </lightning-pill>
                                        </template>
                                    </template>
                                </div>
                            </template>
                        </div>



                        <!-- Description -->
                        <div
                            class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-large-size_1-of-8 slds-p-around_x-small">

                            <label>Visit Description</label>

                            <div style="display: flex; align-items: center; margin-left: 10%;">
                                <!-- Add Icon (Blue Background) -->

                            </div>



                            <div style="display: flex; align-items: center; height: 100%;">
                                <!-- Visit Description Textarea -->
                                <lightning-textarea label="Visit Description" value={row.description}
                                    data-row-id={row.id} onchange={handleDescriptionChange} variant="label-hidden"
                                    style="width: 100%;">
                                </lightning-textarea>

                                <template if:true={row.showAdd}>
                                    <div style="margin-left: 2px;">
                                        <lightning-icon icon-name="action:new" alternative-text="Add" title="Add Row"
                                            data-row-id={row.id} onclick={handleAddRow} size="x-small">
                                        </lightning-icon>
                                    </div>
                                </template>

                                <!-- Delete Icon (Red Background) -->
                                <template if:true={row.showDelete}>
                                    <div style="margin-left: 2px;">
                                        <lightning-icon icon-name="action:delete" alternative-text="Delete"
                                            title="Delete Row" data-row-id={row.id} onclick={handleRemoveRow}
                                            size="x-small">
                                        </lightning-icon>
                                    </div>
                                </template>
                            </div>

                        </div>


                        <!-- Row Buttons -->
                        <!-- <div class="slds-col slds-size_1-of-6 slds-medium-size_1-of-3 slds-large-size_1-of-7 slds-text-align_right slds-p-top_small">
                        
                    </div> -->

                    </div>
                </div>
            </template>

            <!-- Save/Cancel -->
            <div class="slds-m-top_medium slds-align_absolute-center">
                <lightning-button variant="neutral" label="Cancel" onclick={handleCancel} class="slds-m-right_x-small">
                </lightning-button>
                <lightning-button variant="brand" label="Create Visit" disabled={isSaveDisabled}
                    onclick={handleSave}></lightning-button>
            </div>
        </div>
    </lightning-card>
