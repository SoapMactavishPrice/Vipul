<template>
    <div if:true={showSpinner}>
        <lightning-spinner variant="brand" alternative-text="Loading" size="medium"></lightning-spinner>
    </div>

    <div>
        <div class="slds-grid slds-p-vertical_xx-small">
            <div class="slds-size_2-of-12">
                <div style="width: 60%">
                    <lightning-combobox variant="label-hidden" data-show-entries-input value={pageLengthDefaultValue}
                        options={pageLengthOptions} onchange={handlePageEntries}>
                    </lightning-combobox>
                </div>
            </div>
            <div class="slds-size_4-of-12" onkeyup={handleSearch}>
                <lightning-input variant="label-hidden" type="search" onchange={handleSearching} name="Search"
                    label="Search"></lightning-input>
            </div>
            <div class="slds-size_6-of-12">
                <div lwc:dom="manual" data-pagination class="pagination"></div>
            </div>
        </div>

        <div if:true={hasDataInTable}>
            <!-- Yearly View -->
            <div if:true={yearly} class="slds-grid" style="overflow: auto">
                <div class="slds-size_1-of-12"></div>
                <table class="slds-table slds-table_cell-buffer slds-table_bordered targetdatatable">
                    <thead>
                        <tr class="slds-text-title_caps">
                            <th scope="col" class="slds-size_2-of-12" data-colname="Name" onclick={handleSort}>
                                <div class="slds-truncate slds-p-around_xx-small" style="display: flex">
                                    {parameterLabel}
                                </div>
                            </th>
                            <th scope="col" class="slds-size_1-of-12"></th>
                            <th scope="col" class="slds-size_2-of-12">
                                <div class="slds-truncate slds-p-around_xx-small"
                                    style="display: flex; white-space: break-spaces !important;">
                                    Measure
                                </div>
                            </th>
                            <th scope="col" class="slds-size_1-of-12"></th>
                            <th scope="col" class="slds-size_2-of-12">
                                <div class="slds-truncate slds-p-around_xx-small"
                                    style="display: flex; white-space: break-spaces !important;">
                                    Aggregate Quantity
                                </div>
                            </th>
                            <th scope="col" class="slds-size_2-of-12">
                                <div class="slds-truncate slds-p-around_xx-small"
                                    style="display: flex; white-space: break-spaces !important;">
                                    Aggregate Amount
                                </div>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={data} for:item="item">
                            <tr key={item.index} class={item.className}>
                                <td class="slds-size_2-of-12">
                                    <div class="slds-truncate slds-p-around_xx-small">{item.ParameterName}</div>
                                </td>
                                <td></td>
                                <td class="slds-size_2-of-12">
                                    <div class="slds-truncate slds-p-around_xx-small"
                                        style="display: flex; flex-direction: column">
                                        <span>Target</span>
                                        <span>Actual</span>
                                        <span>Pending</span>
                                    </div>
                                </td>
                                <td class="slds-size_2-of-12"></td>
                                <td class="slds-size_2-of-12">
                                    <div class="slds-truncate slds-p-around_xx-small slds-text-align_right"
                                        style="float: left;">
                                        <template if:true={isAccountWiseProductTarget}>
                                            <div class="slds-truncate">{item.Target_Quantity__c}</div>
                                        </template>
                                        <template if:false={isAccountWiseProductTarget}>
                                            <div class="slds-truncate">{item.Target_Quantity_Monthly__c}</div>
                                        </template>
                                        <div class="slds-truncate">{item.Actual_Quantity__c}</div>
                                        <div class="slds-truncate">{item.Pending_Quantity__c}</div>
                                    </div>
                                </td>
                                <td class="slds-size_2-of-12">
                                    <div class="slds-truncate slds-p-around_xx-small slds-text-align_right"
                                        style="float: left;">
                                        <div class="slds-truncate">{item.Target_Amount_Monthly_Rollup__c}</div>
                                        <div class="slds-truncate">{item.Actual_Amount__c}</div>
                                        <div class="slds-truncate">{item.Pending_Amount__c}</div>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
                <div class="slds-size_4-of-12"></div>
            </div>

            <!-- Monthly View -->
            <div if:true={monthly}>
                <div class="scrollwrappper1 targetdatatable">
                    <div class="scrollwrappper2">
                        <table class="slds-table slds-table_bordered monthlytable">
                            <thead>
                                <tr class="slds-text-title_caps">
                                    <th scope="col" data-colname="Name" onclick={handleSort}>
                                        <div class="slds-truncate slds-p-around_xx-small"
                                            style="display: flex; width: 200px">
                                            {parameterLabel}
                                        </div>
                                    </th>
                                    <th scope="col">
                                        <div class="slds-truncate slds-p-around_xx-small" style="width: 100px">
                                            Measure</div>
                                    </th>
                                    <template for:each={months} for:item="item">
                                        <th scope="col" key={item.index} style="text-align: center;">
                                            <div class="slds-truncate slds-p-around_xx-small" style="width: 200px">
                                                {item}</div>
                                        </th>
                                    </template>
                                    <th scope="col">
                                        <div class="slds-truncate slds-p-around_xx-small">&nbsp;</div>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td></td>
                                    <td></td>
                                    <template for:each={months} for:item="item">
                                        <td key={item.index}>
                                            <div class="slds-truncate slds-p-around_xx-small" style="width: 200px">
                                                <div
                                                    style="display: flex; flex-direction:row; align-items: center; justify-content: space-evenly;">
                                                    <div class="slds-truncate slds-p-around_xx-small slds-text-align_right"
                                                        style="display: flex; flex-direction: column">
                                                        <span>Quantity</span>
                                                    </div>
                                                    <div class="slds-truncate slds-p-around_xx-small slds-text-align_right"
                                                        style="display: flex; flex-direction: column">
                                                        <span>Amount</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </td>
                                    </template>
                                </tr>
                                <template for:each={data} for:item="item">
                                    <tr key={item.index}>
                                        <td>
                                            <div class="slds-truncate slds-p-around_xx-small">{item.ParameterName}
                                            </div>
                                        </td>
                                        <td>
                                            <div class="slds-truncate slds-p-around_xx-small"
                                                style="display: flex; flex-direction: column">
                                                <span>Target</span>
                                                <span>Actual</span>
                                                <span>Pending</span>
                                            </div>
                                        </td>
                                        <template for:each={item.childData} for:item="childItem">
                                            <td key={childItem.childIndex} data-childid={childItem.ParameterId}>
                                                <div
                                                    style="display: flex; flex-direction:row; align-items: center; justify-content: space-evenly;">
                                                    <div class="slds-truncate slds-p-around_xx-small slds-text-align_right"
                                                        style="display: flex; flex-direction: column">
                                                        <span>{childItem.Monthly_Target_Quantity__c}</span>
                                                        <span>{childItem.Actual_Quantity__c}</span>
                                                        <span>{childItem.Pending_Quantity__c}</span>
                                                    </div>
                                                    <div class="slds-truncate slds-p-around_xx-small slds-text-align_right"
                                                        style="display: flex; flex-direction: column">
                                                        <span>{childItem.Monthly_Target_Amount__c}</span>
                                                        <span>{childItem.Actual_Amount__c}</span>
                                                        <span>{childItem.Pending_Amount__c}</span>
                                                    </div>
                                                </div>
                                            </td>
                                        </template>
                                        <td class="slds-p-around_xx-small">
                                            <div class="slds-truncate">&nbsp;</div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div if:true={isDataModified} class="slds-m-around_none slds-p-around_none slds-docked-form-footer">
            <lightning-layout vertical-align="center" class="slds-m-vertical_x-small">
                <lightning-layout-item class="slds-col slds-size_2-of-5"></lightning-layout-item>
                <lightning-layout-item class="slds-col slds-size_1-of-5 slds-align_absolute-center">
                    <lightning-button variant="button" type="button" onclick={handleReset} label="Cancel"
                        class="slds-m-horizontal_small">
                    </lightning-button>
                    <lightning-button variant="brand" type="button" onclick={handleSave} label="Save"
                        class="slds-m-horizontal_small">
                    </lightning-button>
                </lightning-layout-item>
                <lightning-layout-item class="slds-col slds-size_3-of-5"></lightning-layout-item>
            </lightning-layout>
        </div>

        <div if:false={hasDataInTable} style="width: 95%">
            <div
                class="slds-grid slds-gutters slds-wrap slds-p-horizontal_small slds-m-top_xx-small slds-m-bottom_xx-small">
                <div class="slds-col slds-size_3-of-12"></div>
                <div class="slds-col slds-size_6-of-12"><img src="/img/chatter/OpenRoad.svg"
                        class="slds-illustration__svg">
                </div>
            </div>
            <div class="slds-col slds-size_3-of-12"></div>
        </div>
    </div>
</template>
