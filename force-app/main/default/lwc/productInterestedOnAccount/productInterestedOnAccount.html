<template>
    <lightning-card>
        <lightning-layout multiple-rows class="slds-m-around_xx-small">
            <lightning-layout-item size="12" class="slds-p-around_small" large-device-size="12" small-device-size="12">
                <label class="slds-text-heading_medium slds-text-title_bold" style="font-size:21px">Add/Edit Product
                    Interested</label>
            </lightning-layout-item>

            <lightning-layout-item size="1" large-device-size="1" small-device-size="12"
                style="background: #dcdcdc;padding: 5px;">
                <label class="slds-m-left_x-small"><strong>New Product ?</strong></label>
            </lightning-layout-item>

            <lightning-layout-item size="3" large-device-size="3" small-device-size="12"
                style="background: #dcdcdc;padding: 5px;">
                <label class="slds-m-left_x-small"><strong>Product Name</strong></label>
            </lightning-layout-item>

            <lightning-layout-item size="2" large-device-size="2" small-device-size="12"
                style="background: #dcdcdc;padding: 5px;">
                <label class="slds-m-left_x-small" style="text-align: center;"><strong>CI</strong></label>
            </lightning-layout-item>

            <lightning-layout-item size="1" large-device-size="1" small-device-size="12"
                style="background: #dcdcdc;padding: 5px;">
                <label class="slds-m-left_x-small"><strong>Quantity</strong></label>
            </lightning-layout-item>

            <lightning-layout-item size="1" large-device-size="1" small-device-size="12"
                style="background: #dcdcdc;padding: 5px;">
                <label class="slds-m-left_x-small"><strong>Quality</strong></label>
            </lightning-layout-item>

            <lightning-layout-item size="1" large-device-size="1" small-device-size="12"
                style="background: #dcdcdc;padding: 5px;">
                <label class="slds-m-left_x-small"><strong>UOM</strong></label>
            </lightning-layout-item>

            <lightning-layout-item size="1" large-device-size="1" small-device-size="12"
                style="background: #dcdcdc;padding: 5px;">
                <label class="slds-m-left_x-small"><strong>Expected Price</strong></label>
            </lightning-layout-item>

            <lightning-layout-item size="1" large-device-size="1" small-device-size="12"
                style="background: #dcdcdc;padding: 5px;">
                <label class="slds-m-left_x-small"><strong>Packaging</strong></label>
            </lightning-layout-item>

            <lightning-layout-item size="1" large-device-size="1" small-device-size="12"
                style="background: #dcdcdc;padding: 5px;">
                <label class="slds-m-left_x-small"><strong>Action</strong></label>
            </lightning-layout-item>

            <template for:each={addAnswer} for:item="answer">

                <lightning-layout-item class="slds-p-vertical_small" key={answer.index} size="1" large-device-size="1"
                    small-device-size="12">
                    <!-- New_Product__c Checkbox -->
                    <lightning-input type="checkbox" variant="label-hidden" checked={answer.New_Product__c}
                        onchange={handleCheckboxChange} data-index={answer.index} class="slds-p-around_medium"
                        style="margin-top: -15px;">
                    </lightning-input>
                </lightning-layout-item>


                <lightning-layout-item class="slds-p-vertical_small" key={answer.index} size="3" large-device-size="3"
                    small-device-size="12">
                    <!-- Conditional rendering based on New_Product__c checkbox -->
                    <template if:true={answer.New_Product__c}>
                        <lightning-layout horizontal-align="spread" style="margin-top: -16px;margin-left: -15px">
                            <lightning-layout-item size="12" large-device-size="12" small-device-size="12">
                                <lightning-input type="text" variant="label-hidden" value={answer.New_Product_Name__c}
                                    onchange={handleTextInputChange} data-index={answer.index}
                                    class="slds-p-around_medium" style="margin-right: -12px;">
                                </lightning-input>
                            </lightning-layout-item>
                        </lightning-layout>
                    </template>


                    <template if:false={answer.New_Product__c}>
                        <!-- When checkbox is unchecked, show a lookup component -->
                        <template lwc:if={answer.prodId}>
                            <c-look-up-component object-api-name="Product2" icon-name="standard:account"
                                data-index={answer.index} style="width: 130" data-label="prodId" index={answer.index}
                                default-record-id={answer.prodId} return-fields="ProductCode" family={answer.prodFamily}
                                sort-column="Name" display-fields="" query-fields="['Name,ProductCode','CI_no__c']"
                                onrecordselection={lookupRecord} onfocus={lookupRecord} filter={currencyfilter}>
                            </c-look-up-component>
                        </template>

                        <template lwc:else>
                            <c-look-up-component object-api-name="Product2" icon-name="standard:account"
                                data-index={answer.index} style="width: 130" data-label="prodId"
                                return-fields="ProductCode" family={answer.prodFamily} sort-column="Name"
                                display-fields="" query-fields="['Name,ProductCode','CI_no__c']"
                                onrecordselection={lookupRecord} onfocus={lookupRecord} filter={currencyfilter}>
                            </c-look-up-component>
                        </template>
                    </template>
                </lightning-layout-item>

                <lightning-layout-item class="slds-p-around_small" key={answer.index} size="2" large-device-size="2"
                    small-device-size="12">

                    <template if:true={answer.New_Product__c}>
                        <lightning-layout horizontal-align="spread" style="margin-top: -16px;margin-left: -15px">
                            <lightning-layout-item size="12" large-device-size="12" small-device-size="12">
                                <lightning-input type="text" variant="label-hidden" value={answer.New_Product_CI_No__c}
                                    onchange={handleCIInputChange} data-index={answer.index}
                                    class="slds-p-around_medium" style="margin-right: -12px;">
                                </lightning-input>
                            </lightning-layout-item>
                        </lightning-layout>
                    </template>

                    <template if:false={answer.New_Product__c}>
                        <lightning-input variant="label-hidden" data-label="ciNo" value={answer.ciNo} disabled
                            data-index={answer.index} onchange={handleScoreChange}
                            style="text-align: center;"></lightning-input>
                    </template>

                </lightning-layout-item>

                <lightning-layout-item class="slds-p-around_small" key={answer.index} size="1" large-device-size="1"
                    small-device-size="12">
                    <lightning-input variant="label-hidden" data-label="volume" data-index={answer.index}
                        value={answer.volume} onchange={handleScoreChange}></lightning-input>
                </lightning-layout-item>

                <lightning-layout-item class="slds-p-around_small" key={answer.index} size="1" large-device-size="1"
                    small-device-size="12">
                    <lightning-input variant="label-hidden" data-label="quality" data-index={answer.index}
                        value={answer.quality} onchange={handleScoreChange}></lightning-input>
                </lightning-layout-item>

                <lightning-layout-item class="slds-p-around_small" key={answer.index} size="1" large-device-size="1"
                    small-device-size="12">
                    <lightning-combobox name="uom" variant="label-hidden" value={answer.uom} options={uomOptions}
                        onchange={handleUOMChange} data-index={answer.index}>
                    </lightning-combobox>
                </lightning-layout-item>

                <lightning-layout-item class="slds-p-around_small" key={answer.index} size="1" large-device-size="1"
                    small-device-size="12">
                    <lightning-input variant="label-hidden" data-label="price" data-index={answer.index}
                        value={answer.price} onchange={handleScoreChange}></lightning-input>
                </lightning-layout-item>

                <lightning-layout-item class="slds-p-around_small" key={answer.index} size="1" large-device-size="1"
                    small-device-size="12">
                    <lightning-combobox name="packaging" variant="label-hidden" value={answer.packaging}
                        options={packagingOptions} onchange={handlePackagingChange} data-index={answer.index}>
                    </lightning-combobox>
                </lightning-layout-item>

                <lightning-layout-item key={answer.index} size="1" large-device-size="1" small-device-size="12">
                    <div style="display:flex; align-items: center;">
                        <!-- Checkbox -->

                        <lightning-button-icon icon-name="utility:add" alternative-text="Raddemove"
                            data-edit={answer.isEdit} data-inid={answer.inId} title="add Answer" onclick={addAnswerItem}
                            data-index={answer.index} class="slds-m-left_xx-small slds-p-around_medium">
                        </lightning-button-icon>

                        <!-- Delete Button -->
                        <lightning-button-icon icon-name="utility:delete" alternative-text="Remove"
                            data-edit={answer.isEdit} data-inid={answer.inId} title="Remove Answer"
                            onclick={removeAnswer} data-index={answer.index}
                            class="slds-m-left_xx-small slds-p-around_medium">
                        </lightning-button-icon>
                    </div>
                </lightning-layout-item>
            </template>
        </lightning-layout>

        <div slot="footer">
            <div class="slds-align_absolute-center" style="display:flex">
                <lightning-button variant="neutral" label="Cancel" onclick={handleCancel}></lightning-button>
                <lightning-button variant="brand" label="Save" class="slds-m-left_xx-small"
                    onclick={save}></lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
